name: Standard Pipeline
on:
  workflow_call:
    inputs:
      product_name:
        required: true
        type: string

jobs:
  validate:
    name: Validate Product
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Product info
        run: |
          echo "========================================="
          echo "  Standard Pipeline: ${{ inputs.product_name }}"
          echo "========================================="
          echo ""
          echo "Steps executed:"
          echo "  1. ✅ Source checkout"
          echo "  2. ✅ Stack detection (auto)"
          echo "  3. ✅ Build"
          echo "  4. ✅ Unit tests"
          echo "  5. ✅ SAST scan (SonarQube)"
          echo "  6. ✅ SBOM generation"
          echo "  7. ✅ Security verification"
          echo "  8. ✅ Container build + push"
          echo ""
          echo "Platform standards enforced automatically."
