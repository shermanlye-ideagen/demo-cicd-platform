name: Standard Pipeline
on:
  workflow_call:
    inputs:
      product_name:
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application
        run: |
          echo "Building ${{ inputs.product_name }}..."
          echo "Build succeeded: 0 warnings, 0 errors"

  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "Running ${{ inputs.product_name }} unit tests..."
          echo "Test suite: 47 tests, 47 passed, 0 failed"
          echo "Code coverage: 84.2% (floor: 80%)"

  sast-scan:
    name: SAST Scan (SonarQube)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SonarQube analysis
        run: |
          echo "SonarQube analysis for ${{ inputs.product_name }}..."
          echo "Coverage floor: 80% (platform policy)"
          echo "SAST scan: PASSED"

  sbom:
    name: SBOM Generation (Veracode)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        run: |
          echo "Generating SBOM for ${{ inputs.product_name }}..."
          echo "SBOM generation: COMPLETE"

  e2e-tests:
    name: E2E Tests (Playwright)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests
        run: |
          echo "Running Playwright E2E for ${{ inputs.product_name }}..."
          echo "3/3 E2E tests passed"

  contract-tests:
    name: Contract Tests (Pact)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pact tests
        run: |
          echo "Running Pact contracts for ${{ inputs.product_name }}..."
          echo "All contracts verified: PASSED"

  security-verify:
    name: Security Verification
    needs: [sast-scan, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Verify security gates
        run: echo "All security gates PASSED for ${{ inputs.product_name }}"

  container-push:
    name: Container Build and Push
    needs: [test, security-verify, e2e-tests, contract-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and push container
        run: echo "Built and pushed ${{ inputs.product_name }}:${{ github.sha }}"

  deploy-test:
    name: Deploy to Test Environment
    needs: container-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via ArgoCD
        run: |
          echo "Deploying ${{ inputs.product_name }} to test environment..."
          echo "Canary tenant deployed, health check: 200 OK"
          echo "Ring rollout complete: all tenants updated"

  nr-baseline:
    name: New Relic Baseline
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
      - name: Capture baseline
        run: echo "New Relic baseline captured for ${{ inputs.product_name }}"
