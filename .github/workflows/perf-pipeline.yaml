name: Perf Pipeline
on:
  workflow_call:
    inputs:
      product_name:
        required: true
        type: string

jobs:
  deploy-perf:
    name: Deploy to Perf Environment
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.product_name }} to perf environment..."
          echo "Deployment: SUCCESSFUL"

  nr-baseline:
    name: New Relic Pre-Test Baseline
    needs: deploy-perf
    runs-on: ubuntu-latest
    steps:
      - name: Capture baseline
        run: echo "Pre-test baseline captured: avg_response_time=45ms, throughput=120rpm"

  load-test:
    name: K6 Baseline Load Test
    needs: nr-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Run load test
        run: |
          echo "K6 baseline load test for ${{ inputs.product_name }}..."
          echo "VUs: 50 | Duration: 5m | p95=89ms | Thresholds: PASSED"

  stress-test:
    name: K6 Stress Test
    needs: nr-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Run stress test
        run: |
          echo "K6 stress test for ${{ inputs.product_name }}..."
          echo "VUs: 10→200 | p95=210ms | Thresholds: PASSED"

  spike-test:
    name: K6 Spike Test
    needs: nr-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Run spike test
        run: |
          echo "K6 spike test for ${{ inputs.product_name }}..."
          echo "VUs: 10→500 instant | Recovery: 15s | Thresholds: PASSED"

  duration-test:
    name: K6 Long-Duration Test
    needs: nr-baseline
    runs-on: ubuntu-latest
    steps:
      - name: Run duration test
        run: |
          echo "K6 long-duration test for ${{ inputs.product_name }}..."
          echo "VUs: 30 | Duration: 5m | No degradation | Thresholds: PASSED"

  resource-profile:
    name: Resource Profiling
    needs: [load-test, stress-test, spike-test]
    runs-on: ubuntu-latest
    steps:
      - name: Profile resources
        run: |
          echo "CPU peak: 65% (stress), 82% (spike)"
          echo "Memory peak: 1.2GB (stress), 1.8GB (spike)"
          echo "Autoscaler: 3→8 pods | Profiling: COMPLETE"

  e2e-under-load:
    name: E2E Under Load
    needs: [load-test, stress-test, spike-test]
    runs-on: ubuntu-latest
    steps:
      - name: Run E2E under load
        run: echo "Playwright E2E passed under 50 VU concurrent load"

  nr-report:
    name: New Relic Report
    needs: [resource-profile, e2e-under-load, duration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Generate report
        run: |
          echo "Performance comparison: no regression detected"
          echo "Performance validation: PASSED"
